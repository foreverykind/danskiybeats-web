<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danskiy Beats — CMS</title>
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
    <style>
      /* Force avatar/user-menu area hidden */
      #cms-user-bar { display: none !important; }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
    (function () {

      /* ── AUTO-SKIP the intermediate "files list" level ──────────────────
         Files collections have one extra click: Collection → File → Editor.
         We map each collection to its single file and redirect instantly.   */
      var FILE_MAP = {
        hero:     'hero_content',
        clients:  'clients_list',
        work:     'works_list',
        releases: 'releases_list',
        contact:  'contact_info'
      };

      // Track previous hash to detect back-navigation
      var _prevHash = window.location.hash;
      var _lastAutoNav = null;

      // MutationObserver: when the file-list for a single-file collection
      // renders, auto-click the file link — but only if we arrived here
      // by clicking the collection in the sidebar (not by navigating back).
      new MutationObserver(function () {
        var hash = window.location.hash;
        var m = hash.match(/^#\/collections\/([^\/]+)\/?$/);
        if (!m) { _lastAutoNav = null; return; }

        var col = m[1], slug = FILE_MAP[col];
        if (!slug) return;
        if (_lastAutoNav === col) return; // already did it

        // If we came FROM a deeper level of this collection, user is going back — don't auto-click
        if (_prevHash.indexOf('/collections/' + col + '/') !== -1) return;

        var link = document.querySelector('a[href*="/files/' + slug + '"]');
        if (link) { _lastAutoNav = col; link.click(); }
      }).observe(document.body, { childList: true, subtree: true });

      window.addEventListener('hashchange', function () {
        var h = window.location.hash;
        _prevHash = h;
        // Reset so the next explicit collection click can auto-navigate again
        if (!h.match(/^#\/collections\/([^\/]+)\/?$/)) _lastAutoNav = null;
      });


      /* ── PREVIEW TEMPLATES: card grid ────────────────────────────────── */

      function ytId(url) {
        if (!url) return null;
        var m = url.match(/(?:youtu\.be\/|[?&]v=|\/v\/|embed\/|shorts\/)([A-Za-z0-9_-]{11})/);
        return m ? m[1] : (url.length === 11 ? url : null);
      }

      var S = {
        wrap:  { display: 'flex', flexWrap: 'wrap', gap: '12px', padding: '16px', background: '#111', minHeight: '100vh' },
        card:  { borderRadius: '6px', overflow: 'hidden', background: '#1c1c1c', position: 'relative', flexShrink: 0 },
        label: { position: 'absolute', bottom: 0, left: 0, right: 0, background: 'rgba(0,0,0,0.72)', color: '#fff', fontSize: '11px', padding: '5px 8px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' },
        none:  { width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#555', fontSize: '13px', textAlign: 'center', padding: '8px', boxSizing: 'border-box' },
        empty: { padding: '32px', color: '#555', fontFamily: 'sans-serif' }
      };
      function ext(a, b) { return Object.assign({}, a, b); }

      /* Releases — 200×200 */
      CMS.registerPreviewTemplate('releases_list', createClass({
        render: function () {
          var items = this.props.entry.getIn(['data', 'items']);
          var getAsset = this.props.getAsset;
          if (!items || !items.size) return h('div', { style: S.empty }, 'No releases yet');
          return h('div', { style: S.wrap },
            items.toJS().map(function (item, i) {
              var cover = item.cover ? getAsset(item.cover).toString() : null;
              return h('div', { key: i, style: ext(S.card, { width: '200px', height: '200px' }) },
                cover
                  ? h('img', { src: cover, style: { width: '200px', height: '200px', objectFit: 'cover', display: 'block' } })
                  : h('div', { style: S.none }, item.title || '–'),
                h('div', { style: S.label }, (item.title || '–') + (item.year ? ' · ' + item.year : ''))
              );
            })
          );
        }
      }));

      /* Clients — 160×160 */
      CMS.registerPreviewTemplate('clients_list', createClass({
        render: function () {
          var items = this.props.entry.getIn(['data', 'items']);
          var getAsset = this.props.getAsset;
          if (!items || !items.size) return h('div', { style: S.empty }, 'No clients yet');
          return h('div', { style: S.wrap },
            items.toJS().map(function (item, i) {
              var logo = item.logo ? getAsset(item.logo).toString() : null;
              return h('div', { key: i, style: ext(S.card, { width: '160px', height: '160px', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '16px', boxSizing: 'border-box' }) },
                logo
                  ? h('img', { src: logo, style: { maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' } })
                  : h('span', { style: { color: '#aaa', fontSize: '13px', textAlign: 'center' } }, item.name || '–')
              );
            })
          );
        }
      }));

      /* Work — 220×148 YouTube thumbnails */
      CMS.registerPreviewTemplate('works_list', createClass({
        render: function () {
          var items = this.props.entry.getIn(['data', 'items']);
          if (!items || !items.size) return h('div', { style: S.empty }, 'No works yet');
          return h('div', { style: S.wrap },
            items.toJS().map(function (item, i) {
              var vid = ytId(item.youtubeUrl);
              var thumb = vid ? 'https://img.youtube.com/vi/' + vid + '/hqdefault.jpg' : null;
              return h('div', { key: i, style: ext(S.card, { width: '220px', height: '148px' }) },
                thumb
                  ? h('img', { src: thumb, style: { width: '220px', height: '148px', objectFit: 'cover', display: 'block' } })
                  : h('div', { style: S.none }, '▶'),
                h('div', { style: S.label }, (item.brand ? item.brand + ' — ' : '') + (item.title || '–'))
              );
            })
          );
        }
      }));


      /* ── BUTTON BAR: "Update website" + "Log out" ────────────────────── */

      function logout() {
        try {
          if (window.CMS && window.CMS.store) {
            window.CMS.store.dispatch({ type: 'AUTH_LOGOUT' });
            return;
          }
        } catch (e) {}
        localStorage.removeItem('netlify-cms-user');
        localStorage.removeItem('decap-cms-user');
        var toRemove = [];
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          if (k && /decap|netlify|github|cms-auth/i.test(k)) toRemove.push(k);
        }
        toRemove.forEach(function (k) { localStorage.removeItem(k); });
        window.location.reload();
      }

      function triggerDeploy(btn) {
        btn.disabled = true;
        btn.textContent = 'Updating…';
        fetch('/api/deploy', { method: 'POST' })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.ok) {
              btn.textContent = 'Done ✓';
              btn.style.borderColor = 'rgba(80,200,80,0.7)';
              btn.style.color = '#7dff7d';
              setTimeout(function () {
                btn.textContent = 'Update website';
                btn.disabled = false;
                btn.style.borderColor = '';
                btn.style.color = '';
              }, 3000);
            } else { throw new Error(data.error); }
          })
          .catch(function () {
            btn.textContent = 'Error — try again';
            btn.style.color = '#ff8080';
            setTimeout(function () {
              btn.textContent = 'Update website';
              btn.disabled = false;
              btn.style.color = '';
            }, 3000);
          });
      }

      /* Build the bar */
      var bar = document.createElement('div');
      bar.id = 'cms-btn-bar';
      bar.style.cssText = [
        'position:fixed', 'top:8px', 'right:12px', 'z-index:2147483647',
        'display:flex', 'gap:8px', 'align-items:center',
        'background:rgba(18,18,22,0.96)',
        'backdrop-filter:blur(6px)',
        '-webkit-backdrop-filter:blur(6px)',
        'border:1px solid rgba(255,255,255,0.1)',
        'border-radius:8px', 'padding:5px 10px'
      ].join(';');

      var BTN = [
        'background:transparent', 'border:1px solid rgba(255,255,255,0.2)',
        'color:rgba(255,255,255,0.8)', 'padding:4px 13px', 'border-radius:5px',
        'cursor:pointer', 'font-size:13px', 'font-family:inherit', 'line-height:1.5',
        'transition:background 0.15s,color 0.15s'
      ].join(';');

      var deployBtn = document.createElement('button');
      deployBtn.textContent = 'Update website';
      deployBtn.style.cssText = BTN + ';border-color:rgba(255,255,255,0.35);color:#fff;font-weight:500';
      deployBtn.onclick = function () { triggerDeploy(deployBtn); };
      deployBtn.onmouseenter = function () { if (!deployBtn.disabled) deployBtn.style.background = 'rgba(255,255,255,0.1)'; };
      deployBtn.onmouseleave = function () { deployBtn.style.background = 'transparent'; };

      var sep = document.createElement('span');
      sep.style.cssText = 'width:1px;height:18px;background:rgba(255,255,255,0.15);flex-shrink:0';

      var logoutBtn = document.createElement('button');
      logoutBtn.textContent = 'Log out';
      logoutBtn.style.cssText = BTN;
      logoutBtn.onclick = logout;
      logoutBtn.onmouseenter = function () { logoutBtn.style.background = 'rgba(255,255,255,0.08)'; logoutBtn.style.color = '#fff'; };
      logoutBtn.onmouseleave = function () { logoutBtn.style.background = 'transparent'; logoutBtn.style.color = 'rgba(255,255,255,0.8)'; };

      bar.appendChild(deployBtn);
      bar.appendChild(sep);
      bar.appendChild(logoutBtn);
      document.body.appendChild(bar);

      /* Hide the CMS avatar/user button once it renders */
      new MutationObserver(function () {
        /* GitHub avatar image */
        document.querySelectorAll(
          'img[src*="avatars.githubusercontent"], img[alt*="vatar"], img[alt*="user"]'
        ).forEach(function (img) {
          var btn = img.closest('button') || img.closest('a');
          if (btn && !btn._cmsHidden) { btn.style.setProperty('display', 'none', 'important'); btn._cmsHidden = true; }
        });
        /* Also target the top-right nav user widget by aria or data attrs */
        document.querySelectorAll('[aria-label*="user" i], [data-testid*="user" i]').forEach(function (el) {
          if (!el._cmsHidden) { el.style.setProperty('display', 'none', 'important'); el._cmsHidden = true; }
        });
      }).observe(document.body, { childList: true, subtree: true });

    })();
    </script>
  </body>
</html>
